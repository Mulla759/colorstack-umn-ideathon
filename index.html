<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ColorStack UMN — Ideathon</title>
<meta name="description" content="ColorStack UMN Ideathon 2026 — Congratulations to WorldTube, Find My Ma'alin, and UMN Park.">
<meta property="og:title" content="ColorStack UMN Ideathon 2026 — Our Winners">
<meta property="og:description" content="Congratulations to WorldTube, Find My Ma'alin, and UMN Park — winners of the ColorStack UMN Ideathon 2026.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://colorstack-umn-ideathon.vercel.app/assets/og-winners.png">
<meta property="og:image:width" content="2880">
<meta property="og:image:height" content="1800">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="theme--maroon">

<!-- ════════════════════════════════════════ WINNERS ════════════════════════════════════════ -->
<section class="slide slide--maroon slide--active" data-theme="maroon">
  <div class="slide-logo-wrap"><img src="assets/cstkgopher.png" alt="" class="slide-logo" aria-hidden="true"></div>
  <div class="split" style="width: 100%; align-items: center;">
    <div class="flex-col gap-md">
      <p class="t-mono anim" style="letter-spacing: 0.2em;">COLORSTACK UMN — IDEATHON 2026</p>
      <h2 class="t-display slide-title-lg anim">Our Winners.</h2>
      <div class="rule anim"></div>
      <p class="t-serif anim" style="font-size: max(16px, 1.2vw); opacity: 0.7; max-width: 38vw;">
        Congratulations to the teams who built, pitched, and won.
        Thank you to every participant, mentor, and judge who made this possible.
      </p>
      <div class="anim" style="margin-top: max(24px, 2vw); display: flex; align-items: center; gap: max(10px, 0.8vw);">
        <a href="https://colorstackumn.org" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: max(10px, 0.8vw); text-decoration: none; color: inherit;">
          <img src="assets/cstkgopher.png" alt="ColorStack" class="winners-branding-logo">
          <span class="t-mono-sm" style="opacity: 0.35;">Colorstackumn.org</span>
        </a>
      </div>
    </div>
    <div class="flex-col gap-md anim">
      <div class="winner-entry anim">
        <div class="winner-entry-img winner-entry-img--1st" data-lightbox="assets/worldtube.JPG">
          <img src="assets/worldtube.JPG" alt="WorldTube">
        </div>
        <div class="flex-col">
          <p class="t-mono-sm" style="color: var(--yellow); letter-spacing: 0.14em;">FIRST PLACE — $200</p>
          <p class="t-serif" style="font-size: max(18px, 1.4vw); font-weight: 600;">WorldTube</p>
        </div>
      </div>
      <div class="winner-entry anim">
        <div class="winner-entry-img" data-lightbox="assets/findmymacalin.JPG">
          <img src="assets/findmymacalin.JPG" alt="Find My Ma'alin">
        </div>
        <div class="flex-col">
          <p class="t-mono-sm" style="color: var(--yellow); letter-spacing: 0.14em;">SECOND PLACE — $150</p>
          <p class="t-serif" style="font-size: max(18px, 1.4vw); font-weight: 600;">MyDugsi</p>
        </div>
      </div>
      <div class="winner-entry anim">
        <div class="winner-entry-img" data-lightbox="">
          <div class="winner-entry-placeholder">03</div>
        </div>
        <div class="flex-col">
          <p class="t-mono-sm" style="color: var(--yellow); letter-spacing: 0.14em;">THIRD PLACE — $100</p>
          <p class="t-serif" style="font-size: max(18px, 1.4vw); font-weight: 600;">UPark</p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-content">
    <img src="" alt="" class="lightbox-img" id="lightboxImg">
    <p class="lightbox-caption t-mono-sm" id="lightboxCaption"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
